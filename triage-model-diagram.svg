<?xml version="1.0" encoding="UTF-8"?>
<svg id="dia" viewBox="0 64 1560 500" role="img" aria-label="Triage-model: Challenge gaat door de Triage naar twee sporen — Discovery (mens leidt) of alleen Delivery (AI leidt) — en eindigt bij Outcome, waarna de cyclus opnieuw begint." xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#948f9e"/></marker>
            <marker id="ahMens" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#5af08c"/></marker>
            <marker id="ahAi" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#9b7bff"/></marker>
            <marker id="ahLoop" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#3fc6ae"/></marker>
            <marker id="ahFade" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
              <path d="M0,0 L9,4.5 L0,9 Z" fill="#8b8794"/></marker>
          </defs>
          <style>
            .nbox{fill:#20202a;stroke:rgba(255,255,255,.22)}
            .ntxt{fill:#f1efe9;font:600 14px "Helvetica Neue",Arial,sans-serif;text-anchor:middle}
            .small{font:11px "Helvetica Neue",Arial,sans-serif;text-anchor:middle;fill:#aaa6b3}
            .hdr{font:700 12px "Helvetica Neue",Arial,sans-serif;letter-spacing:.08em}
            .sub{fill:#aaa6b3;font:11px "Helvetica Neue",Arial,sans-serif}
            .mile{fill:#f1efe9;font:600 12px "Helvetica Neue",Arial,sans-serif;text-anchor:middle}
          </style>

          <rect x="300" y="80" width="640" height="140" rx="16" fill="rgba(90,240,140,0.08)" stroke="rgba(90,240,140,0.45)"/>
          <rect x="300" y="310" width="640" height="130" rx="16" fill="rgba(155,123,255,0.10)" stroke="rgba(155,123,255,0.45)"/>

          <text x="320" y="108" class="hdr" fill="#5af08c">SPOOR 1 · DISCOVERY</text>
          <text x="320" y="126" class="sub">Mens leidt · AI in de lus</text>
          <text x="320" y="338" class="hdr" fill="#9b7bff">SPOOR 2 · ALLEEN DELIVERY</text>
          <text x="320" y="356" class="sub">Operationeel · AI leidt · mens bewaakt</text>

          <rect class="nbox" x="30" y="236" width="110" height="58" rx="10"/>
          <text class="ntxt" x="85" y="270">Challenge</text>
          <polygon points="215,219 261,265 215,311 169,265" fill="#20202a" stroke="rgba(255,255,255,.35)" stroke-width="1.4"/>
          <text class="ntxt" x="215" y="269">Triage</text>
          <text class="small" x="215" y="332">Weegt de klus</text>

          <line x1="140" y1="265" x2="165" y2="265" stroke="#948f9e" stroke-width="1.6" marker-end="url(#ah)"/>
          <path d="M248,247 C300,247 360,155 416,155" fill="none" stroke="#5af08c" stroke-width="1.6" marker-end="url(#ahMens)"/>
          <path d="M248,283 C300,378 308,378 358,378" fill="none" stroke="#9b7bff" stroke-width="1.6" marker-end="url(#ahAi)"/>

          <polygon points="418,155 448,127 478,155 448,183" fill="rgba(90,240,140,0.16)" stroke="#5af08c" stroke-width="1.3"/>
          <polygon points="478,155 508,127 538,155 508,183" fill="none" stroke="#5af08c" stroke-width="1.3" opacity="0.55"/>
          <text x="478" y="206" class="small" fill="#7fd9a0">Diverge → converge → een besluit</text>
          <line x1="545" y1="155" x2="786" y2="155" stroke="#5af08c" stroke-width="1.6" marker-end="url(#ahMens)"/>
          <rect class="nbox" x="790" y="127" width="120" height="56" rx="10"/>
          <text class="ntxt" x="850" y="160">Solution</text>
          <path d="M910,155 C965,155 985,235 1003,235" fill="none" stroke="#5af08c" stroke-width="1.6" marker-end="url(#ahMens)"/>

          <line x1="360" y1="378" x2="902" y2="378" stroke="#9b7bff" stroke-width="1.6"/>
          <rect x="516" y="365" width="232" height="24" rx="12" fill="#20202a" stroke="rgba(155,123,255,0.5)"/>
          <text x="632" y="381" class="small" fill="#9b7bff">Geen Discovery, direct bouwen</text>
          <text x="632" y="410" class="small">CRUD · login · instellingen · betaalflow</text>
          <path d="M902,378 C960,378 985,295 1003,295" fill="none" stroke="#9b7bff" stroke-width="1.6" marker-end="url(#ahAi)"/>

          <rect x="1005" y="200" width="166" height="130" rx="14" fill="rgba(155,123,255,0.08)" stroke="#9b7bff" stroke-width="1.3"/>
          <text x="1022" y="227" class="hdr" fill="#9b7bff">DELIVERY</text>
          <text x="1022" y="245" class="sub">Fast-prototyping</text>
          <polygon points="1030,292 1052,270 1074,292 1052,314" fill="rgba(155,123,255,0.15)" stroke="#9b7bff" stroke-width="1.3"/>
          <text x="1086" y="296" class="sub" style="text-anchor:start">Prototype = de spec</text>

          <line x1="1171" y1="265" x2="1227" y2="265" stroke="#948f9e" stroke-width="1.6" marker-end="url(#ah)"/>
          <rect class="nbox" x="1230" y="236" width="110" height="58" rx="10"/>
          <text class="ntxt" x="1285" y="270">Outcome</text>

          <!-- continuation: de cyclus begint opnieuw -->
          <g opacity="0.4">
            <line x1="1342" y1="265" x2="1392" y2="265" stroke="#8b8794" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ahFade)"/>
            <polygon points="1440,225 1480,265 1440,305 1400,265" fill="#20202a" stroke="rgba(255,255,255,.3)" stroke-width="1.3" stroke-dasharray="5 4"/>
            <text class="ntxt" x="1440" y="269">Triage</text>
            <line x1="1482" y1="265" x2="1544" y2="265" stroke="#8b8794" stroke-width="1.4" stroke-dasharray="3 6"/>
            <text x="1440" y="322" class="small">De poort gaat opnieuw open</text>
          </g>

          <path d="M88,470 L88,478 L847,478 L847,470" fill="none" stroke="#5af08c" stroke-width="1.1" opacity="0.8"/>
          <text x="467" y="464" class="small" fill="#5af08c">Discovery</text>
          <path d="M853,470 L853,478 L1282,478 L1282,470" fill="none" stroke="#9b7bff" stroke-width="1.1" opacity="0.8"/>
          <text x="1067" y="464" class="small" fill="#9b7bff">Delivery</text>

          <line x1="85" y1="492" x2="1285" y2="492" stroke="rgba(255,255,255,.18)" stroke-width="1.2"/>
          <g stroke="#948f9e">
            <line x1="85" y1="487" x2="85" y2="497"/>
            <line x1="478" y1="487" x2="478" y2="497"/>
            <line x1="850" y1="487" x2="850" y2="497"/>
            <line x1="1285" y1="487" x2="1285" y2="497"/>
          </g>
          <text x="85" y="514" class="mile">Challenge</text>
          <text x="478" y="514" class="mile">Problem statement</text>
          <text x="850" y="514" class="mile">Solution</text>
          <text x="1285" y="514" class="mile">Outcome</text>
          <text x="685" y="548" class="small">De vier mijlpalen blijven de gedeelde taal met PO, dev en stakeholders</text>
        </svg>